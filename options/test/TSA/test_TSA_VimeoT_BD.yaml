# general settings
name: TMP_test_Vimeo90K_T_BD
model_type: VideoRecurrentModel
scale: 4
num_gpu: 1  # official: 8 GPUs
manual_seed: 0

datasets:
  test:
    name: Vimeo90K
    type: VideoTestVimeo90KDataset
    dataroot_gt: /share3/home/zqiang/Vimeo90K/sequences
    dataroot_lq: /share3/home/zqiang/Vimeo90K/sequences_BD
    meta_info_file: basicsr/data/meta_info/meta_info_Vimeo90K_test_GT.txt
    cache_data: false
    io_backend:
      type: disk
    num_frame: 7

# network structures
network_g:
  type: TMP
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_frame: 15
  num_extract_block: 3
  num_reconstruct_block: 10
  center_frame_idx: None
  hr_in: False

# path
path:
  pretrain_network_g: /share3/home/zqiang/TMP/experiments/TSA_train_REDS/models/net_g_5000.pth
  strict_load_g: true
  param_key_g: params

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name
  flip_seq: true
  center_frame_only: true # false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: true

    ssim: # metric name, can be arbitrary
      type: calculate_ssim
      crop_border: 0
      test_y_channel: true
