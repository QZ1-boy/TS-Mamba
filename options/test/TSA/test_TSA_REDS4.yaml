# general settings
name: TSA_test_REDS4
model_type: VideoRecurrentModel
scale: 4
num_gpu: 1  # official: 8 GPUs
manual_seed: 0

datasets:
  test:
    name: REDS4
    type: VideoRecurrentTestDataset
    dataroot_gt: /share3/home/zqiang/REDS/REDS4/GT_online
    dataroot_lq: /share3/home/zqiang/REDS/REDS4/REDS4_BI
    io_backend:
      type: disk

    cache_data: true
    num_frame: -1

# network structures
network_g:
  type: TSA
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_frame: 15

# path
path:
  # pretrain_network_g: /share3/home/zqiang/TMP/BI_degradation_REDS.pth
  pretrain_network_g: /share3/home/zqiang/TMP/experiments/TSA_train_REDS/models/net_g_5000.pth
  strict_load_g: true
  param_key_g: params

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name
  flip_seq: false
  center_frame_only: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

    ssim: # metric name, can be arbitrary
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
