# general settings
name: FDAN_test_Vid4_BD
model_type: VideoRecurrentModel
scale: 4
num_gpu: 1  # official: 8 GPUs
manual_seed: 0

datasets:
  test:
    name: Vid4
    type: VideoRecurrentTestDataset
    dataroot_gt: /share3/home/zqiang/Vimeo90K/Vid4/GT
    dataroot_lq: /share3/home/zqiang/Vimeo90K/Vid4/BDx4
    io_backend:
      type: disk

    cache_data: true
    num_frame: -1
    # padding: reflection_circle

# network structures
network_g:
  type: FDAN
  num_feat: 64
  num_extract_block: 0
  num_block: 30
  num_levels: 1
  num_heads: 8
  num_points: 4
  max_residue_magnitude: 10
  flownet_path: experiments/pretrained_models/flownet/fastflownet_ft_sintel.pth
  one_stage_up: true

# path
path:
  pretrain_network_g: /share3/home/zqiang/TMP/experiments/FDAN_train_Vimeo_BD/models/net_g_15000.pth  # 165000 175000 190000 135,000  net_g_200000 15000
  strict_load_g: true
  param_key_g: params

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name
  flip_seq: false
  center_frame_only: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: true

    ssim: # metric name, can be arbitrary
      type: calculate_ssim
      crop_border: 0
      test_y_channel: true
