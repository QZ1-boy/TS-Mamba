# general settings
name: TSA_train_Vimeo_BD
model_type: VideoRecurrentModel
scale: 4
num_gpu: auto  # official: 2 GPUs
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: Vimeo90K
    type: Vimeo90KRecurrentDataset
    dataroot_gt: /share3/home/zqiang/Vimeo90K/sequences
    dataroot_lq: /share3/home/zqiang/Vimeo90K/sequences_BD
    meta_info_file: /share3/home/zqiang/TMP/basicsr/data/meta_info/meta_info_Vimeo90K_train_GT.txt
    io_backend:
      type: disk

    num_frame: -1 
    gt_size: 256
    interval_list: [1]
    random_reverse: false
    use_hflip: true
    use_rot: true
    flip_sequence: true

    # data loader
    num_worker_per_gpu: 6
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 200
    prefetch_mode: ~

  val:
    name: Vid4
    type: VideoRecurrentTestDataset
    dataroot_gt: /share3/home/zqiang/Vimeo90K/Vid4/GT
    dataroot_lq: /share3/home/zqiang/Vimeo90K/Vid4/BDx4

    cache_data: True
    io_backend:
      type: disk

    num_frame: -1  # not needed


# network structures
network_g:
  type: TSA
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_frame: 15

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [150000, 150000]
    restart_weights: [1, 1]
    eta_min: !!float 1e-7

  total_iter: 300000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: CharbonnierTrajectoryLoss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: true

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500

find_unused_parameters: true
